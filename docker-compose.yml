version: '3.9'

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aaos
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: aaos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aaos -d aaos']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aaos-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Apps ───────────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aaos-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://aaos:changeme@postgres:5432/aaos?schema=public
      DIRECT_URL: postgresql://aaos:changeme@postgres:5432/aaos?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aaos-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      API_URL: http://api:3001
      NODE_ENV: production
    env_file: .env
    depends_on:
      - api

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: aaos-client
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      API_URL: http://api:3001
      NODE_ENV: production
    env_file: .env
    depends_on:
      - api

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    container_name: aaos-landing
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
    env_file: .env

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: aaos-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aaos:changeme@postgres:5432/aaos?schema=public
      DIRECT_URL: postgresql://aaos:changeme@postgres:5432/aaos?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
